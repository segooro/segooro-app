<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Segoo.Ro - Management App</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1D407A">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary-gradient: linear-gradient(135deg, #1D407A 0%, #0F2754 100%); 
            --primary-solid: #1D407A; 
            --text-main: #2d3436; 
        }
        body { background: #F4F7FF; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; }
        .app-container { width: 100%; max-width: 480px; min-height: 100vh; background: #F4F7FF; margin: auto; padding: 20px 20px 100px 20px; position: relative; }
        
        .view-page { display: none; flex-direction: column; flex: 1; }
        .view-page.active { display: flex; animation: fadeIn 0.4s ease; }
        
        /* Header Profile */
        .header-profile { display: flex; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        .greeting h1 { font-size: 1rem; margin: 0; color: #b2bec3; font-weight: 500; }
        .greeting p { font-size: 1.2rem; margin: 0; font-weight: 800; color: var(--text-main); text-transform: uppercase; }

        /* Card & UI Elements */
        .glass-input-group { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
        label { font-weight: 700; color: #b2bec3; font-size: 0.75rem; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .btn-submit { background: var(--primary-gradient); border: none; border-radius: 18px; padding: 16px; width: 100%; color: white; font-weight: 700; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(29, 64, 122, 0.2); transition: 0.2s; }
        .btn-submit:active { transform: scale(0.96); }

        /* Stok Row Design */
        .stock-row { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stock-control-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .error-highlight { border: 2px solid #ff4757 !important; background-color: #fffafb !important; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            display: flex; justify-content: space-around; padding: 12px 0 15px 0; z-index: 1000; border-radius: 25px 25px 0 0;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #b2bec3; font-size: 0.6rem; font-weight: 700; transition: 0.3s; }
        .nav-item i { font-size: 1.3rem; margin-bottom: 3px; }
        .nav-item.active { color: var(--primary-solid); }
        
        /* Category Header */
        .category-header-wrapper { background: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid #f1f2f6; }
        .stock-category-header { font-size: 0.85rem; font-weight: 800; color: var(--text-main); margin: 0; }

        .table-container { background: white; border-radius: 15px; padding: 10px; overflow-x: auto; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="app-container">

    <!-- PAGE: LOGIN -->
    <div id="pageLogin" class="view-page active">
        <div class="text-center mb-5 mt-4">
            <img src="https://raw.githubusercontent.com/Dakrooon/img/main/segooro.png" alt="Logo" style="max-width: 180px;">
        </div>
        <div class="mb-3">
            <label>Email Pengguna</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="nama@email.com">
        </div>
        <div class="mb-4">
            <label>Kata Sandi</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="******">
        </div>
        <button class="btn-submit" onclick="handleLogin()">Masuk Sekarang</button>
        <div class="text-center mt-4">
            <a href="#" class="small text-decoration-none fw-bold" onclick="handleRegister()">Daftar Akun Baru</a>
        </div>
    </div>

    <!-- PAGE: PRESENSI (Pegawai Only) -->
    <div id="pagePresensi" class="view-page">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="fw-bold mb-0">Presensi Kerja</h5>
                <small id="userDisplay" class="text-muted"></small>
            </div>
            <button class="btn btn-sm btn-outline-danger" onclick="handleLogout()">Keluar</button>
        </div>
        <div class="glass-input-group">
            <label>Tipe Absen</label>
            <select id="statusType" class="form-select">
                <option value="Datang">Presensi Datang</option>
                <option value="Pulang">Presensi Pulang</option>
            </select>
        </div>
        <button id="btnSubmit" class="btn-submit" onclick="handleAbsen()">Absen Sekarang</button>
    </div>

    <!-- PAGE: INPUT STOK (Owner & Pegawai) -->
    <div id="pageStok" class="view-page">
        <div class="header-profile">
            <div class="greeting"><h1>Input Stok,</h1><p>LAPORAN HARIAN</p></div>
        </div>
        <div class="mb-3">
            <label>Tanggal Laporan</label>
            <input type="date" id="stockDate" class="form-control">
        </div>
        <div id="stockList" style="flex: 1;"></div>
        <button id="btnSaveStock" class="btn-submit mt-3" onclick="handleSaveStock()">Simpan Laporan</button>
    </div>

    <!-- PAGE: KALKULATOR (Owner Only) -->
    <div id="pageKalkulator" class="view-page">
        <div class="header-profile">
            <div class="greeting"><h1>Kalkulator,</h1><p>HITUNG RESEP</p></div>
        </div>
        <div id="kalkulatorContent"></div>
    </div>

    <!-- PAGE: BELANJA (Owner Only) -->
    <div id="pageBelanja" class="view-page">
        <div class="header-profile">
            <div class="greeting"><h1>Belanja,</h1><p>KEBUTUHAN PRODUKSI</p></div>
        </div>
        <div id="belanjaContent"></div>
    </div>

    <!-- PAGE: PANTAU STOK (Owner Only) -->
    <div id="pagePemantau" class="view-page">
        <div class="header-profile">
            <div class="greeting"><h1>Pantau Stok,</h1><p>SISA BAHAN BAKU</p></div>
        </div>
        <div id="pemantauContent"></div>
    </div>

    <!-- PAGE: KEUANGAN (Owner & Pegawai) -->
    <div id="pageKeuangan" class="view-page">
        <div class="header-profile">
            <div class="greeting"><h1>Keuangan,</h1><p>DATA TRANSAKSI</p></div>
        </div>
        <div class="text-center mt-5">
            <i class="bi bi-cone-striped d-block mb-3" style="font-size: 3rem; color: #ddd;"></i>
            <p class="text-muted">Fitur Keuangan menyusul.</p>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav" id="mainNav" style="display: none;">
        <!-- Employee Menus -->
        <a href="javascript:void(0)" id="nav-pagePresensi" onclick="switchPage('pagePresensi')" class="nav-item role-pegawai">
            <i class="bi bi-clock-history"></i><span>Presensi</span>
        </a>
        <a href="javascript:void(0)" id="nav-pageStok" onclick="switchPage('pageStok')" class="nav-item">
            <i class="bi bi-box-seam"></i><span>Stok</span>
        </a>
        <!-- Owner Specific Menus -->
        <a href="javascript:void(0)" id="nav-pageKalkulator" onclick="switchPage('pageKalkulator')" class="nav-item role-owner">
            <i class="bi bi-calculator"></i><span>Resep</span>
        </a>
        <a href="javascript:void(0)" id="nav-pageBelanja" onclick="switchPage('pageBelanja')" class="nav-item role-owner">
            <i class="bi bi-cart3"></i><span>Belanja</span>
        </a>
        <a href="javascript:void(0)" id="nav-pagePemantau" onclick="switchPage('pagePemantau')" class="nav-item role-owner">
            <i class="bi bi-graph-up"></i><span>Pantau</span>
        </a>
        <!-- Common -->
        <a href="javascript:void(0)" id="nav-pageKeuangan" onclick="switchPage('pageKeuangan')" class="nav-item">
            <i class="bi bi-wallet2"></i><span>Keuangan</span>
        </a>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDViCU0SOdL3KqN4SluZCiTVs2gbGUH3So",
        authDomain: "segooro.firebaseapp.com",
        projectId: "segooro",
        storageBucket: "segooro.firebasestorage.app",
        messagingSenderId: "156393338872",
        appId: "1:156393338872:web:f2631bb1f96ea1accc480d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const API_URL = "https://script.google.com/macros/s/AKfycbyEyzRPvKN_H9OTxCe6YzLVFLegtIwB73lagp0weSoSgPjFfHtTxFsL77l75bD8JrOQ/exec";

    // --- AUTH OBSERVER ---
    auth.onAuthStateChanged(async (user) => {
        const nav = document.getElementById('mainNav');
        if (user) {
            Swal.fire({ title: 'Memeriksa Akses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
            try {
                const doc = await db.collection('users').doc(user.email).get();
                if (!doc.exists) throw new Error("User tidak terdaftar di Firestore!");

                const data = doc.data();
                window.currentUser = { ...data, email: user.email };
                window.currentUserNama = data.nama || user.email.split('@')[0];

                // Setup UI Based on Role
                const isOwner = data.role === 'owner';
                document.querySelectorAll('.role-owner').forEach(el => el.style.display = isOwner ? 'flex' : 'none');
                document.querySelectorAll('.role-pegawai').forEach(el => el.style.display = isOwner ? 'none' : 'flex');

                document.getElementById('userDisplay').innerText = `Halo, ${window.currentUserNama} (${data.role.toUpperCase()})`;
                
                nav.style.display = 'flex';
                // Arahkan Owner ke Stok, Pegawai ke Presensi
                switchPage(isOwner ? 'pageStok' : 'pagePresensi');
                Swal.close();
            } catch (e) {
                Swal.fire('Error', e.message, 'error').then(() => auth.signOut());
            }
        } else {
            nav.style.display = 'none';
            showView('pageLogin');
        }
    });

    // --- NAVIGATION ---
    function switchPage(pageId) {
        showView(pageId);
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const activeNav = document.getElementById('nav-' + pageId);
        if (activeNav) activeNav.classList.add('active');

        // Page Init
        if (pageId === 'pageStok') loadStockItems();
        if (pageId === 'pageKalkulator') loadKalkulator();
        if (pageId === 'pageBelanja') loadBelanja();
        if (pageId === 'pagePemantau') loadPemantau();
    }

    function showView(id) {
        document.querySelectorAll('.view-page').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- STOK LOGIC (FIRESTORE) ---
    let currentStockData = [];
    async function loadStockItems() {
        const list = document.getElementById('stockList');
        list.innerHTML = '<div class="text-center mt-4"><div class="spinner-border text-primary"></div></div>';
        
        try {
            // Mengambil dari master_stok Firestore (Hasil Sinkronisasi Jalur Ninja sebelumnya)
            const snapshot = await db.collection('master_stok').get();
            currentStockData = snapshot.docs.map(doc => ({
                nama: doc.id,
                ...doc.data(),
                awal: 0, masuk: 0, terbuang: 0, akhir: ""
            }));

            // Kelompokkan Kategori
            const categories = [...new Set(currentStockData.map(i => i.kategori))];
            let html = '';
            categories.forEach((cat, idx) => {
                html += `
                    <div class="category-header-wrapper mt-3" onclick="toggleElement('cat-box-${idx}')">
                        <h6 class="stock-category-header">${cat} <i class="bi bi-chevron-down float-end"></i></h6>
                    </div>
                    <div id="cat-box-${idx}" style="display: none;">
                `;
                currentStockData.filter(i => i.kategori === cat).forEach((item, itemIdx) => {
                    const globalIdx = currentStockData.indexOf(item);
                    html += `
                        <div id="stockRow-${globalIdx}" class="stock-row">
                            <div class="d-flex justify-content-between mb-2">
                                <b style="font-size: 0.9rem;">${item.nama}</b>
                                <span class="badge bg-light text-dark">${item.satuan}</span>
                            </div>
                            <div class="stock-control-inputs">
                                <div>
                                    <label class="text-success" style="font-size:0.6rem;">MASUK (+)</label>
                                    <input type="number" class="form-control form-control-sm" onchange="currentStockData[${globalIdx}].masuk=parseFloat(this.value)||0">
                                </div>
                                <div>
                                    <label class="text-danger" style="font-size:0.6rem;">TERBUANG (-)</label>
                                    <input type="number" class="form-control form-control-sm" onchange="currentStockData[${globalIdx}].terbuang=parseFloat(this.value)||0">
                                </div>
                            </div>
                            <div class="mt-2">
                                <label class="text-primary" style="font-size:0.6rem;">STOK AKHIR FISIK (=)</label>
                                <input type="number" class="form-control border-primary" placeholder="Wajib isi" onchange="updateAkhir(${globalIdx}, this.value)">
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            });
            list.innerHTML = html;
        } catch (e) {
            list.innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
        }
    }

    function updateAkhir(idx, val) {
        currentStockData[idx].akhir = val === "" ? "" : parseFloat(val);
        document.getElementById(`stockRow-${idx}`).classList.remove('error-highlight');
    }

    async function handleSaveStock() {
        const missing = currentStockData.filter(i => i.akhir === "");
        if (missing.length > 0) {
            Swal.fire('Belum Lengkap', 'Semua Stok Akhir Fisik wajib diisi (ketik 0 jika habis).', 'warning');
            return;
        }

        Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        try {
            // Simpan ke GAS (untuk sementara agar data rekap tetap berjalan di Spreadsheet)
            const res = await gasAPI('saveStockReport', {
                dataArray: currentStockData, 
                dateStr: document.getElementById('stockDate').value,
                petugas: window.currentUserNama
            });
            Swal.fire('Berhasil!', 'Laporan stok tersimpan.', 'success').then(() => switchPage('pageStok'));
        } catch (e) {
            Swal.fire('Error', e.message, 'error');
        }
    }

    // --- OTHER OWNER FUNCTIONS (LOAD FROM GAS TEMPORARILY) ---
    async function loadKalkulator() {
        const container = document.getElementById('kalkulatorContent');
        container.innerHTML = '<p class="text-center mt-5">Memuat data resep...</p>';
        try {
            const recipes = await gasAPI('getRecipesData');
            // Re-use existing render logic
            let options = Object.keys(recipes).map(k => `<option value="${k}">${k}</option>`).join('');
            container.innerHTML = `<select class="form-select mb-3" onchange="runCalc(this.value)"><option value="">Pilih Resep</option>${options}</select><div id="resCalc"></div>`;
            window.globalRecipes = recipes;
        } catch(e) { container.innerHTML = e.message; }
    }

    function runCalc(key) {
        const r = window.globalRecipes[key];
        let html = '<div class="table-container shadow-sm"><table class="table table-sm"><thead><tr><th>Bahan</th><th>Takaran</th></tr></thead><tbody>';
        r.forEach(i => {
            html += `<tr><td>${i.bahan}</td><td>${i.takaran} ${i.satuan}</td></tr>`;
        });
        document.getElementById('resCalc').innerHTML = html + '</tbody></table></div>';
    }

    async function loadPemantau() {
        const container = document.getElementById('pemantauContent');
        container.innerHTML = '<p class="text-center mt-5">Memuat status stok...</p>';
        try {
            const data = await gasAPI('getAdminDashboardData', { 
                stockDate: new Date().toISOString().split('T')[0] 
            });
            // Tampilkan list stok sederhana
            let html = '<div class="table-container"><table class="table table-sm"><thead><tr><th>Barang</th><th>Sisa</th></tr></thead><tbody>';
            data.stocks.forEach(s => {
                html += `<tr><td>${s.nama}</td><td class="fw-bold">${s.akhir || 0} ${s.satuan}</td></tr>`;
            });
            container.innerHTML = html + '</tbody></table></div>';
        } catch(e) { container.innerHTML = e.message; }
    }

    // --- UTILS ---
    function toggleElement(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function gasAPI(action, payload = {}) {
        payload.action = action;
        const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const res = await response.json();
        if (!res.success) throw new Error(res.message);
        return res.data;
    }

    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        if (!email || !pass) return Swal.fire('Info', 'Isi email & sandi', 'warning');
        Swal.fire({ title: 'Masuk...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        auth.signInWithEmailAndPassword(email, pass).catch(e => Swal.fire('Gagal', e.message, 'error'));
    }

    function handleLogout() {
        auth.signOut();
    }

    // --- PRESENSI ---
    function handleAbsen() {
        const type = document.getElementById('statusType').value;
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerHTML = "Menyimpan...";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const now = new Date();
                await db.collection('presensi').add({
                    nama: window.currentUserNama,
                    email: window.currentUser.email,
                    tipe: type,
                    tanggal: now.toLocaleDateString('id-ID'),
                    waktu: now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    lat: pos.coords.latitude, lng: pos.coords.longitude
                });
                Swal.fire('Berhasil!', `Presensi ${type} tercatat.`, 'success');
            } catch (e) { Swal.fire('Error', e.message, 'error'); }
            btn.disabled = false; btn.innerHTML = "Absen Sekarang";
        }, (e) => {
            btn.disabled = false; btn.innerHTML = "Absen Sekarang";
            Swal.fire('GPS Mati', 'Aktifkan lokasi HP.', 'info');
        });
    }

    window.onload = () => {
        if(document.getElementById('stockDate')) document.getElementById('stockDate').valueAsDate = new Date();
    };

    function handleRegister() {
        Swal.fire({
            title: 'Daftar Karyawan',
            html: `<input id="rNama" class="swal2-input" placeholder="Nama">
                   <input id="rEmail" class="swal2-input" placeholder="Email">
                   <input id="rPass" type="password" class="swal2-input" placeholder="Sandi">`,
            preConfirm: () => ({
                nama: document.getElementById('rNama').value,
                email: document.getElementById('rEmail').value,
                pass: document.getElementById('rPass').value
            })
        }).then(res => {
            if (res.isConfirmed) {
                const {nama, email, pass} = res.value;
                auth.createUserWithEmailAndPassword(email, pass).then(async () => {
                    await db.collection('users').doc(email).set({ nama, role: 'pegawai' });
                    Swal.fire('Sukses', 'Akun terdaftar', 'success');
                }).catch(e => Swal.fire('Error', e.message, 'error'));
            }
        });
    }
</script>
</body>
</html>
